# netlify.toml
# Netlify configuration for Timeline Visualisation
# Fully static deployment - no server-side functions needed.
# timeline.csv is served directly from the public folder.

[build]
  command = ""
  publish = "public"

# Redirect all routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
